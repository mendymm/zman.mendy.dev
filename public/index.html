<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zmanim Calculator</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 800px; margin: 20px auto; padding: 0 20px; }
        .search-container { position: relative; margin-bottom: 20px; }
        #search { width: 100%; padding: 10px; font-size: 16px; box-sizing: border-box; }
        #search:disabled { background-color: #f0f0f0; cursor: not-allowed; }
        .autocomplete-items { position: absolute; border: 1px solid #d4d4d4; border-top: none; z-index: 99; top: 100%; left: 0; right: 0; max-height: 300px; overflow-y: auto; background: white; }
        .autocomplete-items div { padding: 10px; cursor: pointer; border-bottom: 1px solid #e4e4e4; }
        .autocomplete-items div:hover { background-color: #e9e9e9; }
        .autocomplete-active { background-color: #1e90ff !important; color: #ffffff; }
        .autocomplete-items .city-name { font-weight: 500; }
        .autocomplete-items .city-time { color: #666; margin-left: 10px; font-size: 0.9em; }
        .date-picker { margin-bottom: 15px; }
        .date-picker label { font-weight: 500; margin-right: 10px; }
        .date-picker input { padding: 8px; font-size: 14px; }
        .location-buttons { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .location-buttons button { margin-bottom: 0; }
        #locationStatus { color: #666; font-size: 0.9em; margin-top: 5px; }
        label { display: block; margin-bottom: 5px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin-bottom: 20px; }
        #zmanim_result { background: #f5f5f5; padding: 15px; border-radius: 5px; }
        .zmanim-results h3 { margin: 0 0 15px 0; color: #333; }
        .zmanim-results table { width: 100%; border-collapse: collapse; }
        .zmanim-results td { padding: 8px 12px; border-bottom: 1px solid #e0e0e0; }
        .zmanim-results .time { font-weight: 600; color: #2c5282; white-space: nowrap; }
        .zmanim-results .time.highlight { color: #c53030; font-weight: 700; }
        .zmanim-results .label { color: #555; }
        .zmanim-results .shaah-zmanis { margin-top: 15px; padding-top: 10px; border-top: 2px solid #ccc; color: #666; font-style: italic; }
        .zmanim-results .location-info { color: #666; font-size: 0.9em; margin-bottom: 15px; }
        .zmanim-results .date-info { color: #444; font-size: 0.95em; margin-bottom: 8px; }
        .zmanim-results .date-info:first-of-type { font-weight: 500; }
        .loading { color: #666; font-style: italic; }
        .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid #e0e0e0; color: #666; font-size: 0.85em; }
        .footer a { color: #2c5282; }
    </style>
</head>
<body>
    <h1>Zmanim Calculator</h1>
    
    <div class="search-container">
        <input type="text" id="search" placeholder="Search for a city..." autocomplete="off">
        <div id="autocomplete-list" class="autocomplete-items"></div>
    </div>
    
    <div class="date-picker">
        <label for="date">Date:</label>
        <input type="date" id="date">
    </div>
    
    <div class="location-buttons">
        <button type="button" id="calcBtn">Calculate Zmanim</button>
        <button type="button" id="locationBtn">Use My Location</button>
    </div>
    <div id="locationStatus"></div>
    
    <input type="hidden" id="lat" value="45.5017">
    <input type="hidden" id="lon" value="-73.5673">
    <input type="hidden" id="elevation" value="23">
    <input type="hidden" id="tz" value="America/Montreal">
    
    <h2>Results</h2>
    <div id="zmanim_result" class="loading">Loading city data...</div>
    
    <div class="footer">
        This website is built by Mendy Man<br>
        Zmanim calculations powered by <a href="https://github.com/YSCohen/rust-zmanim" target="_blank">rust-zmanim</a><br>
        For corrections/comments/notes please email me at <a href="mailto:zman@mendy.dev">zman@mendy.dev</a>
    </div>

    <script type="module" src="./dist/app.js"></script>
</body>
</html>
